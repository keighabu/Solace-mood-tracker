<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="bottomnav.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathe | Solace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #E0F2F1;
        }

        .breathe-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

       .top-nav {
    display: flex;
    justify-content: center;
    width: 100%;
    max-width: 400px;
    margin-bottom: 20px;
}
        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #556B55;
            padding: 10px 22px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: white;
            transform: translateX(-5px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .breathe-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .breathe-header h1 {
            font-size: 24px;
            color: #2e2e2e;
        }

        .breathe-header p {
            font-size: 14px;
            color: #777;
        }

        .breathing-card {
            background: white;
            padding: 40px 20px;
            border-radius: 40px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        .heart-wrapper {
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .heart-animate {
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: 50% 50%;
        }

        .heart-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        @keyframes breatheHeart {
            0%   { transform: scale(1);    }
            33%  { transform: scale(1.35); }
            66%  { transform: scale(1.35); }
            100% { transform: scale(1);    }
        }

        .heart-active {
            animation: breatheHeart 12s ease-in-out infinite;
        }

        #instruction-text {
            font-size: 20px;
            color: #2e2e2e;
            margin-bottom: 10px;
            min-height: 32px;
        }

        .begin-btn {
            background: #D1D8D1;
            border: none;
            padding: 12px 35px;
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .begin-btn:hover {
            background: #B2C8BA;
            color: white;
        }
    </style>
</head>
<body>
    <div class="breathe-container">

        <nav class="top-nav">
            <a href="dashboard.html" class="back-btn">← Back</a>
        </nav>

        <header class="breathe-header">
            <h1>Take a moment to breathe 🌿</h1>
            <br>
            <p>A guided 4-4-4 breathing exercise</p>
        </header>

        <main class="breathing-card">
            <div class="heart-wrapper">
                <div id="breathingHeart" class="heart-animate">
                    <svg class="heart-svg" viewBox="48 30 204 198" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <radialGradient id="heartGrad" cx="38%" cy="32%" r="60%">
                                <stop offset="0%" stop-color="#daeee3"/>
                                <stop offset="40%" stop-color="#B2C8BA"/>
                                <stop offset="100%" stop-color="#6a9a7a"/>
                            </radialGradient>
                            <radialGradient id="shineGrad" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
                                <stop offset="100%" stop-color="white" stop-opacity="0"/>
                            </radialGradient>
                        </defs>
                        <path d="M150,228 C150,228 48,160 48,88 C48,53 70,30 100,30 C118,30 134,40 150,58 C166,40 182,30 200,30 C230,30 252,53 252,88 C252,160 150,228 150,228 Z" fill="url(#heartGrad)"/>
                        <path d="M150,228 C150,228 48,160 48,88 C48,53 70,30 100,30 C118,30 134,40 150,58 C166,40 182,30 200,30 C230,30 252,53 252,88 C252,160 150,228 150,228 Z" fill="none" stroke="#5a8a6a" stroke-width="1" opacity="0.4"/>
                        <path d="M100,45 C112,38 126,40 138,50 C143,44 147,39 150,36 C153,39 157,44 162,50 C174,40 188,38 200,45 C182,30 166,40 150,58 C134,40 118,30 100,30 C70,30 48,53 48,88 C48,66 65,46 100,45 Z" fill="white" opacity="0.18"/>
                        <ellipse cx="112" cy="64" rx="20" ry="13" fill="url(#shineGrad)" opacity="0.7" transform="rotate(-25,112,64)"/>
                        <path d="M75,76 C72,93 70,113 76,136" fill="none" stroke="#6a9a7a" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
                        <path d="M103,44 C111,40 120,39 129,43" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
                    </svg>
                </div>
            </div>
            <h2 id="instruction-text">Ready when you are</h2>
            <button id="startBreathe" class="begin-btn">▶ Begin</button>
        </main>

    </div>

    <script>
        const heart = document.getElementById('breathingHeart');
        const btn = document.getElementById('startBreathe');
        const text = document.getElementById('instruction-text');

        const phases = [
            { label: 'Inhale...', duration: 4000 },
            { label: 'Hold...', duration: 4000 },
            { label: 'Exhale...', duration: 4000 },
        ];

        let running = false;
        let phaseIndex = 0;
        let timer = null;

        function runPhase() {
            const phase = phases[phaseIndex];
            text.textContent = phase.label;
            clearTimeout(timer);
            timer = setTimeout(() => {
                phaseIndex = (phaseIndex + 1) % phases.length;
                runPhase();
            }, phase.duration);
        }

        btn.addEventListener('click', () => {
            if (!running) {
                running = true;
                btn.textContent = 'Stop';
                heart.classList.add('heart-active');
                phaseIndex = 0;
                runPhase();
            } else {
                running = false;
                btn.textContent = '▶ Begin';
                heart.classList.remove('heart-active');
                text.textContent = 'Ready when you are';
                clearTimeout(timer);
            }
        });
    </script>

</body>
</html>
