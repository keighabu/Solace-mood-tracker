<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Solace - Mood Screen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="bottomnav.css">
</head>
<body>

    <div class="page-wrapper">
        <a href="dashboard.html" class="back-link">← Dashboard</a>
    </div>
    <div class="glass-card">
        <h2 class="mood-title">Choose your <i>mood</i> today</h2>
        <p class="mood-subtitle">There are no wrong answers — just notice what's here.</p>

        <div class="mood-options">
            <button class="mood-btn" type="button" onclick="selectMood(this, 'Joyful')">🤩</button>
            <button class="mood-btn" type="button" onclick="selectMood(this, 'Calm')">😌</button>
            <button class="mood-btn" type="button" onclick="selectMood(this, 'Okay')">🙂</button>
            <button class="mood-btn" type="button" onclick="selectMood(this, 'Meh')">😐</button>
            <button class="mood-btn" type="button" onclick="selectMood(this, 'Sad')">😢</button>
            <button class="mood-btn" type="button" onclick="selectMood(this, 'Angry')">😡</button>
            <button class="mood-btn" type="button" onclick="selectMood(this, 'Anxious')">😰</button>
        </div>

        <div class="reflection-box">
            <label>WHAT MADE YOU FEEL THIS WAY?</label>
            <textarea placeholder="Optional — a sentence, a word, anything."></textarea>
        </div>

        <button class="save-btn" id="saveMoodBtn">Save mood</button>
    </div>

    <script>
        let selectedMood = "";

        function selectMood(btn, mood) {
            document.querySelectorAll('.mood-btn').forEach(b => {
                b.style.backgroundColor = "transparent";
                b.style.border = "none";
            });
            btn.style.backgroundColor = "rgba(138, 163, 138, 0.2)";
            btn.style.border = "2px solid #8AA38A";
            btn.style.borderRadius = "50%";
            selectedMood = mood;
        }

        document.getElementById('saveMoodBtn').addEventListener('click', () => {
            if (!selectedMood) {
                alert("Please select a mood first!");
                return;
            }

            let moodHistory = JSON.parse(localStorage.getItem('moodHistory')) || [];

            const newEntry = {
                mood: selectedMood,
                date: new Date().toISOString(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            moodHistory.push(newEntry);
            localStorage.setItem('moodHistory', JSON.stringify(moodHistory));

            let currentCount = parseInt(localStorage.getItem('moodCount')) || 0;
            localStorage.setItem('moodCount', currentCount + 1);

            window.location.href = 'dashboard.html';
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
